name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 触发自动部署的分支

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v3

    - name: Set up Node.js 🖥️
      uses: actions/setup-node@v3
      with:
        node-version: '16' # 选择你项目所需的Node.js版本

    - name: Install and Build 🔧
      run: |
        cd frontend/demoweb-project
        npm ci
        npm run build

    - name: Deploy 🚀
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/demoweb-project/dist # Vue项目的构建输出目录